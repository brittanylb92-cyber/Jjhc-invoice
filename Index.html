<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Invoice - App Hub</title>
    <style>
        /* Essential basic styling for layout */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f7f9fc; color: #333; line-height: 1.6; }
        .container { max-width: 900px; margin: 2rem auto; padding: 2rem; background: #fff; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        /* Form Layout */
        header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem; }
        header .business-info { flex-grow: 1; }
        header .invoice-meta { width: 300px; }

        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.3rem; }
        input[type="text"], input[type="date"], select { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }

        /* Invoice Line Table */
        table.invoice-lines { width: 100%; border-collapse: collapse; margin-top: 2rem; margin-bottom: 2rem; }
        table.invoice-lines th, table.invoice-lines td { text-align: left; padding: 1rem; border-bottom: 1px solid #eee; }
        table.invoice-lines th { color: #555; font-weight: 600; }
        
        /* Specific column adjustments */
        table.invoice-lines .col-description { width: 50%; }
        table.invoice-lines .col-qty { width: 10%; text-align: center; }
        table.invoice-lines .col-unitprice { width: 20%; text-align: right; }
        table.invoice-lines .col-amount { width: 20%; text-align: right; font-weight: 600; }

        input.qty-input, input.price-input { text-align: center; border: 1px solid transparent; background: transparent; padding: 0.5rem; }
        input.qty-input:focus, input.price-input:focus { background: white; border: 1px solid #aaa; }

        /* Totals Section */
        .totals-block { width: 300px; margin-left: auto; text-align: right; }
        .total-row { display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 1.1rem; }
        .total-row.grand-total { font-weight: 700; font-size: 1.4rem; color: #2980b9; border-top: 2px solid #ddd; padding-top: 0.8rem; }

        /* Buttons */
        .btn-add-line { background: #3498db; color: white; border: none; padding: 0.6rem 1rem; border-radius: 4px; cursor: pointer; }
        .btn-save { display: block; width: 100%; background: #27ae60; color: white; font-weight: 700; font-size: 1.2rem; border: none; padding: 1.2rem; border-radius: 6px; cursor: pointer; margin-top: 2rem; transition: background 0.2s; }
        .btn-save:hover { background: #2ecc71; }
    </style>
</head>
<body>

    <div class="container">
        
        <form id="invoice-form">
            <header>
                <div class="business-info">
                    <h1>New Invoice</h1>
                    <div class="form-group">
                        <label>Business Name</label>
                        <input type="text" value="Jeremiah Johnson H&C" />
                    </div>
                </div>

                <div class="invoice-meta">
                    <div class="form-group">
                        <label>Invoice #</label>
                        <input type="text" value="00101" disabled />
                    </div>
                    <div class="form-group">
                        <label>Due Date</label>
                        <input type="date" value="2024-06-15" />
                    </div>
                </div>
            </header>

            <section class="bill-to">
                <h2>Bill To</h2>
                <div class="form-group">
                    <label>Select Customer</label>
                    <select>
                        <option value="">Choose a customer...</option>
                        <option value="1">John Doe - 123 Main St</option>
                        <option value="2">Jane Smith - 456 Oak Ln</option>
                    </select>
                </div>
                </section>

            <section>
                <table class="invoice-lines" id="invoice-lines-table">
                    <thead>
                        <tr>
                            <th class="col-description">Description</th>
                            <th class="col-qty">Qty</th>
                            <th class="col-unitprice">Unit Price</th>
                            <th class="col-amount">Amount</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><input type="text" placeholder="Service / Item Description" /></td>
                            <td><input type="number" class="qty-input" value="1" min="1" step="1" /></td>
                            <td><input type="number" class="price-input" value="150.00" min="0" step="0.01" /></td>
                            <td class="col-amount line-amount">$150.00</td>
                        </tr>
                    </tbody>
                </table>
                
                <button type="button" class="btn-add-line" id="add-line-btn">+ Add Line</button>
            </section>

            <section class="totals-block">
                <div class="total-row"><span>Subtotal:</span> <span id="subtotal">$150.00</span></div>
                <div class="total-row grand-total"><span>Total:</span> <span id="total">$150.00</span></div>
            </section>

            <button type="submit" class="btn-save">Save & Close</button>
        </form>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('invoice-form');
            const linesTable = document.getElementById('invoice-lines-table').getElementsByTagName('tbody')[0];
            const addLineBtn = document.getElementById('add-line-btn');
            const subtotalEl = document.getElementById('subtotal');
            const totalEl = document.getElementById('total');

            // --- Real-time Calculations ---
            const updateTotals = () => {
                let currentSubtotal = 0;

                // Loop through all table rows
                const rows = linesTable.querySelectorAll('tr');
                rows.forEach(row => {
                    const qty = parseFloat(row.querySelector('.qty-input').value) || 0;
                    const price = parseFloat(row.querySelector('.price-input').value) || 0;
                    const amount = qty * price;
                    
                    row.querySelector('.line-amount').textContent = `$${amount.toFixed(2)}`;
                    currentSubtotal += amount;
                });

                // Update the global totals
                subtotalEl.textContent = `$${currentSubtotal.toFixed(2)}`;
                totalEl.textContent = `$${currentSubtotal.toFixed(2)}`; // For a simple invoice, subtotal=total
            };

            // Setup input listeners to trigger calculation on any change
            const attachListeners = (row) => {
                const inputs = row.querySelectorAll('.qty-input, .price-input');
                inputs.forEach(input => {
                    input.addEventListener('input', updateTotals);
                });
            };

            // Apply listeners to the initial default row
            attachListeners(linesTable.querySelector('tr'));


            // --- Add Line Functional ---
            addLineBtn.addEventListener('click', () => {
                const newRow = linesTable.insertRow();
                newRow.innerHTML = `
                    <td><input type="text" placeholder="Service / Item Description" /></td>
                    <td><input type="number" class="qty-input" value="1" min="1" step="1" /></td>
                    <td><input type="number" class="price-input" value="0.00" min="0" step="0.01" /></td>
                    <td class="col-amount line-amount">$0.00</td>
                `;
                
                // CRITICAL: Attach listeners to the new row
                attachListeners(newRow);
                updateTotals(); // Recalculate everything after adding
            });

            // --- Prevent default form submission for now ---
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                alert('Invoice Saved! (Note: In a real app, this data would be sent to a backend server.)');
            });

            // Initial calculation run
            updateTotals();
        });
    </script>
</body>
</html>
